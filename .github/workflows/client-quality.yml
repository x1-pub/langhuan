name: Workspace Quality

on:
  pull_request:
    paths:
      - 'client/**'
      - 'server/**'
      - 'packages/**'
      - '.github/workflows/client-quality.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'eslint.config.mjs'
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'server/**'
      - 'packages/**'
      - '.github/workflows/client-quality.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'eslint.config.mjs'

jobs:
  workspace-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint workspace
        run: pnpm lint:check

      - name: Typecheck client
        run: pnpm --filter client typecheck

      - name: Typecheck server
        run: pnpm --filter server typecheck

      - name: Build client
        run: pnpm --filter client build

      - name: Build server
        run: pnpm --filter server build
