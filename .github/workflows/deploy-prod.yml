name: Deploy Production

on:
  # 合并到发布分支后会触发（可改为你的目标分支）
  push:
    branches:
      - prod
    paths:
      - 'client/**'
      - 'server/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch:

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required deployment secrets
        env:
          TENCENT_COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          TENCENT_COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
          TENCENT_COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          DEPLOY_SERVER_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_SERVER_PORT: ${{ secrets.DEPLOY_SERVER_PORT }}
          DEPLOY_SERVER_USER: ${{ secrets.DEPLOY_SERVER_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_INDEX_HTML_PATH: ${{ secrets.SERVER_INDEX_HTML_PATH }}
        run: |
          set -euo pipefail
          required_keys=(
            TENCENT_COS_SECRET_ID
            TENCENT_COS_SECRET_KEY
            TENCENT_COS_REGION
            TENCENT_COS_BUCKET
            DEPLOY_SERVER_HOST
            DEPLOY_SERVER_USER
            DEPLOY_SSH_KEY
            SERVER_INDEX_HTML_PATH
          )

          for key in "${required_keys[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error title=Missing secret::${key} is required."
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client for CDN
        env:
          # 可在仓库变量中配置；未配置时默认使用你的 CDN 域名
          CDN_BASE_URL: ${{ vars.CDN_BASE_URL }}
        run: |
          set -euo pipefail
          CDN_BASE_URL="${CDN_BASE_URL:-https://cdn.x1.pub/}"
          case "$CDN_BASE_URL" in
            */) ;;
            *) CDN_BASE_URL="${CDN_BASE_URL}/" ;;
          esac

          pnpm --filter client exec tsc -b
          pnpm --filter client exec vite build --base "$CDN_BASE_URL"

      - name: Upload static assets to Tencent COS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.TENCENT_COS_REGION }}
          COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
          COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
        run: |
          set -euo pipefail

          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi

          if ! echo "$COS_BUCKET" | grep -Eq '^.+-[0-9]{6,}$'; then
            echo "::error title=Invalid COS bucket::TENCENT_COS_BUCKET must be full bucket name with appid suffix, e.g. xxx-1250000000."
            exit 1
          fi

          aws configure set default.s3.addressing_style virtual
          aws configure set default.s3.signature_version s3v4

          COS_ENDPOINT="https://cos.${COS_REGION}.myqcloud.com"

          aws s3 sync client/dist/assets "s3://${COS_BUCKET}/assets" \
            --endpoint-url "$COS_ENDPOINT" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

          aws s3 sync client/dist "s3://${COS_BUCKET}/" \
            --endpoint-url "$COS_ENDPOINT" \
            --delete \
            --exclude "index.html" \
            --exclude "assets/*" \
            --cache-control "public,max-age=600"

      - name: Setup SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SERVER_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_SERVER_PORT: ${{ secrets.DEPLOY_SERVER_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          SERVER_PORT="${DEPLOY_SERVER_PORT:-22}"
          ssh-keyscan -p "$SERVER_PORT" -H "$DEPLOY_SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload index.html to server
        env:
          DEPLOY_SERVER_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_SERVER_PORT: ${{ secrets.DEPLOY_SERVER_PORT }}
          DEPLOY_SERVER_USER: ${{ secrets.DEPLOY_SERVER_USER }}
          SERVER_INDEX_HTML_PATH: ${{ secrets.SERVER_INDEX_HTML_PATH }}
        run: |
          set -euo pipefail
          SERVER_PORT="${DEPLOY_SERVER_PORT:-22}"
          SERVER_DIR="$(dirname "$SERVER_INDEX_HTML_PATH")"

          ssh -p "$SERVER_PORT" "$DEPLOY_SERVER_USER@$DEPLOY_SERVER_HOST" "mkdir -p \"$SERVER_DIR\""
          scp -P "$SERVER_PORT" client/dist/index.html \
            "$DEPLOY_SERVER_USER@$DEPLOY_SERVER_HOST:$SERVER_INDEX_HTML_PATH"

  deploy-node-server:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    # 可通过仓库变量 ENABLE_SERVER_DEPLOY=true 开启
    if: ${{ vars.ENABLE_SERVER_DEPLOY == 'true' }}
    steps:
      - name: Validate server deployment secrets
        env:
          DEPLOY_SERVER_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_SERVER_PORT: ${{ secrets.DEPLOY_SERVER_PORT }}
          DEPLOY_SERVER_USER: ${{ secrets.DEPLOY_SERVER_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        run: |
          set -euo pipefail
          required_keys=(
            DEPLOY_SERVER_HOST
            DEPLOY_SERVER_USER
            DEPLOY_SSH_KEY
            SERVER_APP_DIR
          )

          for key in "${required_keys[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error title=Missing secret::${key} is required."
              exit 1
            fi
          done

      - name: Setup SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SERVER_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_SERVER_PORT: ${{ secrets.DEPLOY_SERVER_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          SERVER_PORT="${DEPLOY_SERVER_PORT:-22}"
          ssh-keyscan -p "$SERVER_PORT" -H "$DEPLOY_SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy Node service on server
        env:
          DEPLOY_SERVER_HOST: ${{ secrets.DEPLOY_SERVER_HOST }}
          DEPLOY_SERVER_PORT: ${{ secrets.DEPLOY_SERVER_PORT }}
          DEPLOY_SERVER_USER: ${{ secrets.DEPLOY_SERVER_USER }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          SERVER_PORT="${DEPLOY_SERVER_PORT:-22}"

          ssh -p "$SERVER_PORT" "$DEPLOY_SERVER_USER@$DEPLOY_SERVER_HOST" \
            "export DEPLOY_BRANCH='$DEPLOY_BRANCH'; export SERVER_APP_DIR='$SERVER_APP_DIR'; bash -s" <<'EOF'
          set -euo pipefail

          cd "$SERVER_APP_DIR"
          git fetch --all --prune
          if git show-ref --verify --quiet "refs/heads/$DEPLOY_BRANCH"; then
            git checkout "$DEPLOY_BRANCH"
          else
            git checkout -b "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH"
          fi
          git pull --ff-only origin "$DEPLOY_BRANCH"

          pnpm install --frozen-lockfile
          pnpm --filter server build

          if pm2 describe langhuan_server >/dev/null 2>&1; then
            pm2 reload langhuan_server --update-env
          else
            pm2 start dist/server/src/index.js --name langhuan_server -i max
          fi

          pm2 save
          EOF
